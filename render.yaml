# Render Blueprint for the Rails micropost app (training-demo deployment, free plan).
#
# Notes / constraints (free plan):
# - Ephemeral filesystem: the SQLite DBs and uploaded files reset on every restart/redeploy.
#   `db:prepare` in startCommand re-creates and re-seeds the DB on each cold start, so the
#   pre-activated seed users always exist.
# - Service spins down after 15 min of inactivity (cold start on next request).
# - 512MB RAM: keep a single Puma worker (WEB_CONCURRENCY=1).
# - Background jobs: ModerationJob runs SYNCHRONOUSLY (perform_now) inside the web request.
#   The in-Puma Solid Queue worker (SOLID_QUEUE_IN_PUMA) is NOT used: on this free instance
#   the puma plugin forks a second Rails process that dies with "uninitialized constant
#   SolidQueue", and 512MB can't host a second process anyway. Turbo broadcasts still update
#   the UI in real time. If you upgrade the instance, you can re-introduce async processing.
services:
  - type: web
    name: micropost-rails
    runtime: ruby
    plan: free
    region: singapore # closest free region to Japan
    branch: main
    buildCommand: "bundle install && bundle exec rails assets:precompile"
    startCommand: "bundle exec rails db:prepare && bundle exec puma -C config/puma.rb"
    healthCheckPath: /up
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MAX_THREADS
        value: "3"
      - key: WEB_CONCURRENCY
        value: "1"
      - key: RAILS_LOG_LEVEL
        value: info
      # --- Secrets / cross-service values: set manually in the dashboard ---
      # Value of config/master.key (never commit it).
      - key: RAILS_MASTER_KEY
        sync: false
      # Public URL of the FastAPI moderation service, e.g. https://micropost-fastapi.onrender.com
      - key: MODERATION_API_BASE_URL
        sync: false
      # This service's own host, e.g. micropost-rails.onrender.com (used for mailer link host).
      - key: APP_HOST
        sync: false
